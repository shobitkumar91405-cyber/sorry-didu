<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Shathi ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0033, #4a148c);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Top Handle Style */
        .top-handle {
            position: absolute;
            top: 15px;
            width: 100%;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.7); /* Dark text */
            z-index: 100;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffb7ce;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 85%;
        }

        .gif-container {
            width: 220px;
            height: 220px;
            margin-bottom: 25px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: linear-gradient(45deg, #ff69b4, #9c27b0);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
            z-index: 20;
        }

        /* Background & Balloon Styles */
        #bg-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 70px;
            height: 85px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            animation: floatBalloon linear infinite;
        }

        .balloon::after {
            content: "↓";
            position: absolute;
            bottom: -15px;
            color: rgba(255,255,255,0.5);
        }

        @keyframes floatBalloon {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-handle">follow - @smss1708 🌺</div>

    <audio id="bg-music" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>

    <div class="page active" id="page-1">
        <h1>Hi Shathi! ✨</h1>
        <p>I am sivasingh🥀 and I made a little website for you...</p>
        <button class="btn" onclick="nextPage(1)">Click Here</button>
    </div>

    <div class="page" id="page-2">
        <div class="gif-container">
            <img src="flower1.gif" alt="Flower 1">
        </div>
        <p>It was really nice meeting you today! 🌸</p>
        <button class="btn" onclick="nextPage(2)">Next</button>
    </div>

    <div class="page" id="page-3">
        <div class="gif-container">
            <img src="flower2.gif" alt="Flower 2">
        </div>
        <p>I hope your day was as awesome as your vibe. 🌷</p>
        <button class="btn" onclick="nextPage(3)">One more</button>
    </div>

    <div class="page" id="page-4">
        <div class="gif-container">
            <img src="flower3.gif" alt="Flower 3">
        </div>
        <h1>Keep Smiling! 😊</h1>
        <p>Glad we became friends. Have a great day !</p>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');

        function nextPage(current) {
            if (current === 1) {
                bgMusic.play().catch(() => console.log("Music interaction required"));
            }
            
            document.getElementById(`page-${current}`).classList.remove('active');
            const next = document.getElementById(`page-${current + 1}`);
            if (next) {
                setTimeout(() => next.classList.add('active'), 100);
            }
        }

        function createElements() {
            const container = document.getElementById('bg-container');
            const colors = ['#ff69b4', '#ffeb3b', '#03a9f4', '#8bc34a', '#ff5722'];
            
            // Create Balloons with "sathi" text
            for (let i = 0; i < 8; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.innerText = 'sathi';
                b.style.left = Math.random() * 90 + 'vw';
                b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                b.style.animationDuration = (Math.random() * 5 + 7) + 's';
                b.style.animationDelay = Math.random() * 8 + 's';
                container.appendChild(b);
            }

            // Keep some sparkles for magic
            const sparkles = ['✨', '⭐'];
            for (let i = 0; i < 6; i++) {
                let s = document.createElement('div');
                s.style.position = 'absolute';
                s.style.bottom = '-50px';
                s.style.left = Math.random() * 100 + 'vw';
                s.innerText = sparkles[Math.floor(Math.random() * sparkles.length)];
                s.style.animation = `floatBalloon ${Math.random() * 3 + 5}s linear infinite`;
                s.style.opacity = '0.4';
                container.appendChild(s);
            }
        }
        
        window.onload = createElements;
    </script>
</body>
</html>

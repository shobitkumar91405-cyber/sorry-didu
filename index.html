<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday, cutiee ❤️‍🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f001a, #1a0033, #2a004d);
            font-family: 'Playfair Display', serif;
            touch-action: none; /* Prevents default scroll/zoom lagging during drag */
            color: #fff;
        }
        
        .premium-font { font-family: 'Dancing Script', cursive; }
        .title-font { font-family: 'Cinzel Decorative', cursive; letter-spacing: 2px; }
        
        .section {
            position: absolute; inset: 0;
            display: none; opacity: 0;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; width: 100vw; height: 100vh;
        }

        .section.active { display: flex; opacity: 1; }

        .glass-premium {
            background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
            backdrop-filter: blur(12px) saturate(180%); /* Slightly reduced blur for better mobile performance */
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,105,180,0.08);
            border-radius: 24px;
        }
        
        .ultra-glow {
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 25px #ff1493,
                0 0 45px #c71585,
                0 0 70px #ff1493;
        }

        .bg-particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
        
        .particle {
            position: absolute; top: -15%; 
            color: #ff69b4; font-size: 24px;
            animation: fallPremium linear infinite;
            text-shadow: 0 0 12px currentColor;
            will-change: transform, opacity; /* GPU acceleration */
        }
        @keyframes fallPremium {
            0% { transform: translate3d(0, -15vh, 0) rotate(0deg) scale(0.7); opacity: 0.3; }
            20% { opacity: 0.9; }
            100% { transform: translate3d(0, 115vh, 0) rotate(720deg) scale(1.1); opacity: 0; }
        }

        .wish-card {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: perspective(800px) rotateX(8deg) rotateY(6deg);
            will-change: transform;
        }
        .wish-card:hover, .wish-card:active {
            transform: perspective(800px) rotateX(0deg) rotateY(0deg) scale(1.1) translateY(-8px);
            box-shadow: 0 25px 50px rgba(255,105,180,0.3);
        }

        .balloon {
            width: 80px; height: 105px;
            background: radial-gradient(circle at 35% 25%, #ffffff55, transparent 60%), radial-gradient(circle at 30% 30%, #fff, var(--balloon-color));
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            position: absolute;
            box-shadow: 
                inset -8px -8px 16px rgba(0,0,0,0.25),
                0 12px 30px rgba(255,105,180,0.5),
                0 0 40px rgba(255,105,180,0.3);
            animation: floatPremium 5.5s ease-in-out infinite alternate;
            will-change: transform;
            cursor: pointer;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
            width: 3px; height: 40px; background: linear-gradient(transparent, rgba(255,255,255,0.7));
            border-radius: 3px;
        }
        @keyframes floatPremium {
            0% { transform: translate3d(0, 0, 0) rotate(-6deg) scale(1); }
            100% { transform: translate3d(0, -35px, 0) rotate(6deg) scale(1.04); }
        }
        
        .pop-text-anim {
            animation: premiumPop 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes premiumPop {
            0% { opacity: 0; transform: translate3d(0, 40px, 0) scale(0.6) rotate(-8deg); filter: blur(4px); }
            60% { opacity: 1; transform: translate3d(0, -12px, 0) scale(1.15) rotate(4deg); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotate(0deg); filter: blur(0); }
        }

        .cake-container { filter: drop-shadow(0 20px 50px rgba(236,72,153,0.45)); }
        
        /* Updated Knife CSS for JS transform */
        #knife {
            position: absolute;
            top: 0; left: 0; /* Reset */
            font-size: 4.5rem;
            pointer-events: none;
            will-change: transform;
            z-index: 30;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body>

    <div class="fixed top-4 left-0 w-full text-center z-[100] text-white/50 text-xs font-mono tracking-widest pointer-events-none">
        made by sivasingh instagram📷 - @smss1708
    </div>

    <audio id="bgmusic" loop><source src="tere-liye.mp3" type="audio/mpeg"></audio>

    <div class="bg-particles" id="particles-container"></div>

    <section id="intro" class="section active" style="z-index: 10;">
        <div class="text-center z-20">
            <h1 class="text-7xl md:text-9xl premium-font ultra-glow mb-6 title-font">hey cutiee ❤️‍🔥</h1>
            <p class="text-4xl premium-font text-pink-300 mb-14">i have something very special for you...</p>
            <button onclick="startExperience()" class="bg-gradient-to-br from-pink-600 via-rose-500 to-purple-600 px-12 py-5 rounded-full text-2xl font-bold hover:scale-110 hover:shadow-2xl transition-all duration-500 shadow-xl shadow-pink-700/60 text-white border border-pink-400/30">
                unlock surprise 💞
            </button>
        </div>
    </section>

    <section id="wishes" class="section" style="z-index: 10;">
        <h2 class="text-6xl premium-font ultra-glow mb-10 text-center">open my wishes 💌</h2>
        <div class="grid grid-cols-2 gap-8 z-20 w-full max-w-lg px-5">
            <div class="wish-card glass-premium p-10 rounded-3xl text-center flex items-center justify-center flex-col cursor-pointer" onclick="openWish('you are the most beautiful soul inside & out. keep shining always cutiee 🌸')">
                <i class="fa-solid fa-heart text-5xl text-pink-500 mb-4 ultra-glow"></i>
                <p class="text-white font-bold text-xl">wish 1</p>
            </div>
            <div class="wish-card glass-premium p-10 rounded-3xl text-center flex items-center justify-center flex-col cursor-pointer" onclick="openWish('may every dream of yours become reality this year. you deserve the whole universe! ✨')">
                <i class="fa-solid fa-star text-5xl text-yellow-300 mb-4 ultra-glow"></i>
                <p class="text-white font-bold text-xl">wish 2</p>
            </div>
            <div class="wish-card glass-premium p-10 rounded-3xl text-center flex items-center justify-center flex-col cursor-pointer" onclick="openWish('no matter where life takes us, my care & support for you will never fade 💞')">
                <i class="fa-solid fa-gift text-5xl text-rose-400 mb-4 ultra-glow"></i>
                <p class="text-white font-bold text-xl">wish 3</p>
            </div>
            <div class="wish-card glass-premium p-10 rounded-3xl text-center flex items-center justify-center flex-col cursor-pointer" onclick="openWish('happy birthday cutiee! let’s make today legendary. i love you endlessly ❤️‍🔥')">
                <i class="fa-solid fa-cake-candles text-5xl text-orange-300 mb-4 ultra-glow"></i>
                <p class="text-white font-bold text-xl">wish 4</p>
            </div>
        </div>
        <button id="btn-after-wishes" onclick="nextPage('cake')" class="mt-12 bg-gradient-to-r from-pink-600 to-rose-600 px-10 py-4 rounded-full glass-premium text-white text-xl font-bold hidden hover:scale-105 transition-all shadow-lg shadow-pink-700/50 border border-pink-400/20">
            next magic ✨
        </button>

        <div id="wish-modal" class="fixed inset-0 bg-black/85 hidden items-center justify-center z-50 px-6">
            <div class="glass-premium p-12 rounded-3xl text-center max-w-lg w-full relative border border-pink-500/20">
                <p id="wish-text" class="text-3xl md:text-4xl premium-font ultra-glow leading-relaxed text-pink-100"></p>
                <button onclick="closeWish()" class="mt-10 bg-gradient-to-r from-pink-600 to-rose-600 text-white px-10 py-3 rounded-full font-bold text-lg hover:scale-105 transition">close ✕</button>
            </div>
        </div>
    </section>

    <section id="cake" class="section" style="z-index: 10;">
        <div class="text-center mb-10 z-20 pointer-events-none">
            <h2 class="text-6xl premium-font ultra-glow">cut your cake cutiee! 🎂</h2>
            <p class="text-pink-300 mt-3 text-xl">drag the knife gently</p>
        </div>
        <div class="cake-container relative w-[340px] h-[280px] z-20" id="cake-wrapper">
            <div class="relative w-full h-full pointer-events-none">
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[300px] h-[80px] bg-gradient-to-b from-pink-600 to-rose-700 rounded-[50%]"></div>
                <div class="absolute bottom-[60px] left-1/2 -translate-x-1/2 w-[230px] h-[70px] bg-gradient-to-b from-pink-500 to-rose-600 rounded-[50%]"></div>
                <div class="absolute bottom-[120px] left-1/2 -translate-x-1/2 w-[160px] h-[60px] bg-gradient-to-b from-rose-400 to-pink-500 rounded-[50%]"></div>
                <div class="absolute bottom-[170px] left-1/2 -translate-x-1/2 flex gap-6">
                    <div class="w-4 h-12 bg-white/90 rounded-full shadow-lg"></div>
                    <div class="w-4 h-14 bg-white/90 rounded-full shadow-lg"></div>
                    <div class="w-4 h-12 bg-white/90 rounded-full shadow-lg"></div>
                </div>
            </div>
            <div id="knife">🔪</div>
        </div>
        <div id="cake-message" class="hidden text-center mt-10 z-20">
            <h3 class="text-5xl premium-font ultra-glow">happy birthday cutiee ❤️‍🔥</h3>
            <button onclick="nextPage('balloons')" class="mt-8 bg-gradient-to-r from-pink-600 to-purple-600 px-10 py-4 rounded-full text-xl font-bold text-white hover:scale-105 transition shadow-xl shadow-pink-700/50">
                play with balloons 🎈
            </button>
        </div>
    </section>

    <section id="balloons" class="section" style="z-index: 10;">
        <div class="text-center z-20 mb-10 pointer-events-none">
            <h1 class="text-6xl md:text-8xl premium-font ultra-glow mb-3">pop the balloons cutiee! 🎈</h1>
            <p class="text-pink-200 text-xl">tap to explode them</p>
        </div>
        
        <div id="balloon-container" class="relative w-full h-[65vh] max-w-lg z-20"></div>

        <button id="btn-after-balloons" onclick="goToVideo()" class="absolute bottom-12 left-1/2 -translate-x-1/2 bg-gradient-to-r from-pink-600 via-rose-500 to-purple-600 px-12 py-5 rounded-full text-2xl font-bold text-white shadow-2xl hidden z-30 hover:scale-105 transition-all duration-500">
            see the final surprise 🎬
        </button>
    </section>

    <section id="video-page" class="section bg-black" style="z-index: 50; padding: 0;">
        <video id="final-video" src="video1.mp4" playsinline preload="auto" controlsList="nodownload" class="w-full h-full object-cover pointer-events-none"></video>
    </section>

    <script>
        let music = document.getElementById('bgmusic');
        let wishesRead = 0;
        let balloonsPopped = 0;
        const totalBalloons = 6;
        let isTransitioning = false; // Bug Fix: Prevents double-clicking overlap

        function startExperience() {
            music.volume = 0.5;
            music.play().catch((e)=>console.log("Audio play blocked until interaction:", e));
            nextPage('wishes');
        }

        function nextPage(nextId) {
            if (isTransitioning) return;
            isTransitioning = true;

            const current = document.querySelector('.section.active');
            const next = document.getElementById(nextId);

            gsap.to(current, {opacity:0, duration:0.5, ease:"power2.inOut", onComplete:()=>{
                current.classList.remove('active');
                next.classList.add('active');
                gsap.fromTo(next, {opacity:0, scale:0.92}, {opacity:1, scale:1, duration:0.6, ease:"back.out(1.4)", onComplete: () => {
                    isTransitioning = false;
                }});
                
                if(nextId === 'cake') initCake();
                if(nextId === 'balloons') initBalloons();
            }});
        }

        function openWish(text) {
            document.getElementById('wish-text').innerText = text;
            const modal = document.getElementById('wish-modal');
            modal.style.display = 'flex';
            gsap.fromTo(modal.children[0], {scale:0.4, opacity:0, rotation:-5}, {scale:1, opacity:1, rotation:0, duration:0.5, ease:"back.out(1.7)"});
            wishesRead++;
            if(wishesRead >= 1) document.getElementById('btn-after-wishes').classList.remove('hidden');
        }

        function closeWish() {
            gsap.to(document.getElementById('wish-modal').children[0], {scale:0.6, opacity:0, duration:0.3, onComplete:()=>{
                document.getElementById('wish-modal').style.display = 'none';
            }});
        }

        let cakeInitialized = false;
        function initCake() {
            if(cakeInitialized) return; // Bug Fix: Prevent multiple listeners
            cakeInitialized = true;

            const wrap = document.getElementById('cake-wrapper');
            const knife = document.getElementById('knife');
            let hasCut = false;
            let isCutting = false;
            
            // Set initial position of knife using transform (Hardware Accelerated)
            knife.style.transform = `translate(140px, -30px) rotate(-35deg)`;
            
            const moveKnife = (e) => {
                if(!isCutting || hasCut) return;
                
                // Get precise coordinates whether touch or mouse
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const rect = wrap.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                // Lag Fix: Using translate instead of top/left
                requestAnimationFrame(() => {
                    knife.style.transform = `translate(${x - 40}px, ${y - 40}px) rotate(-35deg)`;
                });
                
                // Check if knife hits the middle of the cake
                if(x > 60 && x < 280 && y > 80 && y < 220) {
                    hasCut = true;
                    isCutting = false;
                    document.getElementById('cake-message').classList.remove('hidden');
                    confetti({particleCount:180, spread:80, origin:{y:0.6}});
                }
            };

            wrap.addEventListener('pointerdown', (e) => { isCutting = true; moveKnife(e); });
            window.addEventListener('pointermove', moveKnife);
            window.addEventListener('pointerup', () => { isCutting = false; });
            window.addEventListener('pointercancel', () => { isCutting = false; });
        }

        function initBalloons() {
            const container = document.getElementById('balloon-container');
            container.innerHTML = '';
            balloonsPopped = 0;
            const colors = ['#ff4785','#ffaa00','#00d4ff','#ff70db','#00ffaa','#ff36e0'];
            
            for(let i=0; i<totalBalloons; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.style.setProperty('--balloon-color', colors[i]);
                b.style.left = `${Math.random()*75 + 12}%`;
                b.style.top = `${Math.random()*55 + 15}%`;
                b.style.animationDelay = `${Math.random()*3}s`;
                
                b.onclick = function(e) {
                    confetti({particleCount:60, spread:70, origin:{x:e.clientX/innerWidth, y:e.clientY/innerHeight}});
                    b.style.display = 'none';
                    
                    let text = document.createElement('div');
                    text.innerHTML = "happy birthday cutiee 🩵";
                    text.className = "absolute premium-font ultra-glow text-3xl font-bold pop-text-anim whitespace-nowrap text-center w-full text-pink-200 pointer-events-none";
                    text.style.left = "0";
                    text.style.top = b.style.top;
                    container.appendChild(text);
                    
                    balloonsPopped++;
                    if(balloonsPopped === totalBalloons) {
                        document.getElementById('btn-after-balloons').classList.remove('hidden');
                    }
                };
                container.appendChild(b);
            }
        }

        function goToVideo() {
            if(isTransitioning) return;
            isTransitioning = true;
            
            music.pause();
            const current = document.querySelector('.section.active');
            const videoSec = document.getElementById('video-page');
            const video = document.getElementById('final-video');

            gsap.to(current, {opacity:0, duration:0.7, ease:"power3.in", onComplete:()=>{
                current.classList.remove('active');
                videoSec.classList.add('active');
                video.play().catch((e) => console.log("Video Play Error:", e));
                isTransitioning = false;
            }});
        }

        // Background Particles
        const pContainer = document.getElementById('particles-container');
        for(let i=0; i<25; i++) { // Slightly reduced from 35 for better performance
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = Math.random() > 0.4 ? '🌹' : '💞';
            p.style.left = `${Math.random()*100}vw`;
            p.style.animationDuration = `${Math.random()*4 + 6}s`;
            p.style.animationDelay = `${Math.random()*8}s`;
            p.style.fontSize = `${Math.random()*18 + 14}px`;
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
